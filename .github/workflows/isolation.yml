# Tenant-isolation CI gate (v1.0 P5).
#
# Runs the three isolation-class suites on every push to main and on
# every pull request that touches the backend:
#
#   * tests/test_multi_tenant_isolation.py — the P1 canary
#   * tests/test_two_tenant_isolation.py    — the P5 end-to-end smoke
#   * tests/test_migration_lint.py          — keeps 0009+ migrations
#                                             schema-agnostic
#
# **Failures are P0 blockers.** Tenant isolation is the load-bearing
# guarantee for the whole multi-tenant SaaS posture; any cross-tenant
# leak surfaced by these suites stops the line. See
# `CLAUDE.md §"Status"` for the rule.

name: tenant-isolation

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/isolation.yml"

jobs:
  isolation:
    name: Isolation suites + migration lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hadir
          POSTGRES_PASSWORD: hadir
          POSTGRES_DB: hadir
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Match the dev compose so the orchestrator + auth code see the
      # same shape of environment in CI as a developer's laptop.
      HADIR_ENV: dev
      HADIR_TENANT_MODE: single
      HADIR_DEFAULT_TENANT_ID: "1"
      HADIR_DATABASE_URL: postgresql+psycopg://hadir_app:hadir_app@localhost:5432/hadir
      HADIR_ADMIN_DATABASE_URL: postgresql+psycopg://hadir:hadir@localhost:5432/hadir
      HADIR_APP_DB_PASSWORD: hadir_app
      HADIR_ADMIN_DB_PASSWORD: hadir_admin
      HADIR_FERNET_KEY: zE3rJWRZ2y6q5FyzsnktOUFP7fnNBp8R3LU6azcs4VQ=
      HADIR_LOCAL_TIMEZONE: Asia/Muscat
      HADIR_SESSION_IDLE_MINUTES: "60"
      HADIR_SESSION_COOKIE_NAME: hadir_session
      HADIR_SESSION_COOKIE_SECURE: "false"
      HADIR_LOGIN_MAX_ATTEMPTS: "10"
      HADIR_LOGIN_RATE_LIMIT_RESET_MINUTES: "10"
      HADIR_MATCH_THRESHOLD: "0.45"
      HADIR_ATTENDANCE_RECOMPUTE_MINUTES: "15"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend deps
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Bootstrap DB roles + run migrations
        working-directory: backend
        run: |
          # The initial migration creates hadir_app/hadir_admin roles
          # using the env-provided passwords; the orchestrator then
          # advances every schema to head.
          python -m scripts.migrate

      - name: Run isolation suites + migration lint
        working-directory: backend
        run: |
          pytest -q \
            tests/test_migration_lint.py \
            tests/test_multi_tenant_isolation.py \
            tests/test_two_tenant_isolation.py
