notifications:
  approval_assigned:
    subject: "مراجعة {stage}: طلب {request_type} مقدّم من {submitter_name}"
    body: "وصل طلب {request_type} إلى قائمتك. راجعه واتخذ القرار من صندوق الموافقات."
  approval_decided:
    subject: "تم {status_label} طلب {request_type} الخاص بك"
    body: "{decider_label} وضع طلبك في حالة {status_label}."
  admin_override:
    subject: "تجاوز إداري · طلب {request_type} {status_label}"
    body: "قام أحد المسؤولين بتجاوز قرار {previous_stage} على هذا الطلب."
    body_no_prior: "اتخذ أحد المسؤولين قرارًا على هذا الطلب عبر التجاوز الإداري."
  overtime_flagged:
    subject: "تنبيه ساعات إضافية · {employee_full_name} ({employee_code}) — {overtime_minutes} دقيقة في {date}"
    body: "تجمّعت لدى {employee_full_name} ({employee_code}) {overtime_minutes} دقيقة من العمل الإضافي بتاريخ {date}. يرجى المراجعة والاعتماد من صفحة الحضور اليومي."
  camera_unreachable:
    subject: "كاميرا غير متاحة · {camera_name} منذ {minutes_unreachable} دقيقة"
    body: "الكاميرا {camera_name} (المعرّف={camera_id}) غير متاحة منذ {minutes_unreachable} دقيقة. يرجى المتابعة من صفحة سجلات الكاميرا."
  report_ready:
    subject: "تقرير {format_upper} جاهز ({range_label})"
    body: "اكتمل بنجاح تقرير الحضور بصيغة {format_upper} للفترة {range_label}. افتحه من صفحة التقارير أو من البريد المرسل إليك."

email:
