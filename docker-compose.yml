services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: maugood
      # P28: pick up the operator-supplied admin password from
      # ``MAUGOOD_ADMIN_DB_PASSWORD`` so the bootstrap superuser
      # ``maugood`` and the URL Alembic uses
      # (``MAUGOOD_ADMIN_DATABASE_URL``) agree on day one. Falls
      # back to the dev default ``maugood`` so an unconfigured
      # ``docker compose up`` keeps working in development.
      POSTGRES_PASSWORD: ${MAUGOOD_ADMIN_DB_PASSWORD:-maugood}
      POSTGRES_DB: maugood
    volumes:
      # Bind mount under the install dir's ./data/ tree so the
      # operator can ``ls`` what's actually there, ``tar -czf``
      # backup the whole install in one shot, and not have to think
      # about ``docker volume inspect``. Override the host path
      # via MAUGOOD_POSTGRES_DATA_DIR to put the DB on a different
      # disk if you want it elsewhere.
      - ${MAUGOOD_POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    ports:
      # Host port is env-overridable so a second Maugood instance on
      # the same machine can pick a different port (e.g.
      # MAUGOOD_POSTGRES_HOST_PORT=15432). Defaults to the standard
      # 5432 when unset, so a single-instance deploy is unchanged.
      - "${MAUGOOD_POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maugood -d maugood"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      # App-runtime URL (maugood_app role, limited grants) — this is what
      # FastAPI connects with at request time.
      MAUGOOD_DATABASE_URL: ${MAUGOOD_DATABASE_URL:-postgresql+psycopg://maugood_app:maugood_app@postgres:5432/maugood}
      # Admin URL (maugood_admin role, full grants) — used only by Alembic
      # and the seed scripts. In dev we connect as the POSTGRES_USER ('maugood',
      # which owns the database) until the first migration creates
      # maugood_admin; subsequent runs could switch to maugood_admin, but there
      # is no behavioural difference and staying on 'maugood' avoids a
      # chicken-and-egg bootstrap.
      MAUGOOD_ADMIN_DATABASE_URL: ${MAUGOOD_ADMIN_DATABASE_URL:-postgresql+psycopg://maugood:maugood@postgres:5432/maugood}
      # Role passwords used by the initial migration to CREATE ROLE. The
      # defaults match the URLs above so a fresh `docker compose up` just
      # works without any .env editing.
      MAUGOOD_APP_DB_PASSWORD: ${MAUGOOD_APP_DB_PASSWORD:-maugood_app}
      MAUGOOD_ADMIN_DB_PASSWORD: ${MAUGOOD_ADMIN_DB_PASSWORD:-maugood_admin}
      MAUGOOD_TENANT_MODE: ${MAUGOOD_TENANT_MODE:-single}
      MAUGOOD_ENV: ${MAUGOOD_ENV:-dev}
      # Option B — clip saving mode. Default ``stream_copy`` spawns a
      # parallel ffmpeg subprocess per camera that segments the H.264
      # stream directly to disk (zero encode CPU); on clip finalize
      # the ClipWorker concat-copies segments. Costs one extra RTSP
      # connection per camera. Set ``MAUGOOD_CLIP_SAVING_MODE=encode``
      # in .env to roll back to the legacy JPEG-re-encode path.
      MAUGOOD_CLIP_SAVING_MODE: ${MAUGOOD_CLIP_SAVING_MODE:-stream_copy}
    volumes:
      - ./backend:/app
      # P28-followup: the pre_omran_reset_seed script needs to read the
      # host's .gitignore (red-line check before writing credentials.txt)
      # and write credentials.txt back to the host's repo root. The
      # mount is read-write because of the credentials.txt write; the
      # .gitignore file is never modified by the script.
      - .:/repo
      # Encrypted employee photos (P6) and capture crops (P8), plus
      # attachments / reports / ERP exports / branding logos all land
      # under /data inside the container. Bind-mounted into ./data/
      # of the install dir for operator-friendly access ("where ARE
      # my face crops?" → "right here, just ``ls``"). Override via
      # MAUGOOD_FACES_DATA_DIR for a different host location.
      - ${MAUGOOD_FACES_DATA_DIR:-./data/faces}:/data
      # Person clip videos. Mounted separately because the /data
      # volume maps to ./data/faces and person clips need their own
      # directory at ./data/person_clips/ (not under ./data/faces/).
      - ${MAUGOOD_PERSON_CLIPS_DIR:-./data/person_clips}:/person_clips
      # Face crop images extracted from person clips. Each crop is
      # stored camera-wise/event-wise at this path.
      - ${MAUGOOD_FACE_CROPS_DIR:-./data/face_crops}:/face_crops
      # InsightFace model cache (~250 MB buffalo_l). Downloaded once
      # on first detection; persisted via a bind mount so the
      # download doesn't repeat on every container rebuild. Override
      # via MAUGOOD_INSIGHTFACE_MODELS_DIR.
      - ${MAUGOOD_INSIGHTFACE_MODELS_DIR:-./data/insightface_models}:/root/.insightface
      # P21: read-only mount of the frontend tree so the JSX i18n
      # lint test can scan ``frontend/src/**/*.tsx`` from the backend
      # pytest run. Defensive — the lint skips gracefully if the
      # mount is absent (e.g. a non-compose pytest invocation).
      - ./frontend:/frontend:ro
    ports:
      - "${MAUGOOD_BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      # Inside the compose network the backend is reachable by service name.
      VITE_BACKEND_URL: http://backend:8000
      # Hide the "Person Clips" sidebar entry. Set to 1 (or true/yes/on)
      # to enable. Interpolation honours an .env at repo root, so
      # MAUGOOD_HIDE_PERSON_CLIPS=1 there flips it without editing
      # compose.
      VITE_HIDE_PERSON_CLIPS: "${MAUGOOD_HIDE_PERSON_CLIPS:-1}"
    volumes:
      - ./frontend:/app
      # Named volume keeps the Linux-built node_modules separate from the
      # macOS-built one on the host bind mount.
      - frontend_node_modules:/app/node_modules
    ports:
      - "${MAUGOOD_FRONTEND_HOST_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  # frontend_node_modules stays a named volume even though the rest
  # moved to bind mounts: the dev frontend service bind-mounts
  # ./frontend → /app, and a host-side node_modules built on macOS
  # would clobber the Linux-built one inside the container. Named
  # volume keeps the two separate. (The prod stack removes the dev
  # frontend service entirely — node_modules lives inside the nginx
  # build there, not here.)
  frontend_node_modules:
