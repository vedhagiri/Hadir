services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: hadir
      POSTGRES_PASSWORD: hadir
      POSTGRES_DB: hadir
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hadir -d hadir"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      # App-runtime URL (hadir_app role, limited grants) — this is what
      # FastAPI connects with at request time.
      HADIR_DATABASE_URL: ${HADIR_DATABASE_URL:-postgresql+psycopg://hadir_app:hadir_app@postgres:5432/hadir}
      # Admin URL (hadir_admin role, full grants) — used only by Alembic
      # and the seed scripts. In dev we connect as the POSTGRES_USER ('hadir',
      # which owns the database) until the first migration creates
      # hadir_admin; subsequent runs could switch to hadir_admin, but there
      # is no behavioural difference and staying on 'hadir' avoids a
      # chicken-and-egg bootstrap.
      HADIR_ADMIN_DATABASE_URL: ${HADIR_ADMIN_DATABASE_URL:-postgresql+psycopg://hadir:hadir@postgres:5432/hadir}
      # Role passwords used by the initial migration to CREATE ROLE. The
      # defaults match the URLs above so a fresh `docker compose up` just
      # works without any .env editing.
      HADIR_APP_DB_PASSWORD: ${HADIR_APP_DB_PASSWORD:-hadir_app}
      HADIR_ADMIN_DB_PASSWORD: ${HADIR_ADMIN_DB_PASSWORD:-hadir_admin}
      HADIR_TENANT_MODE: ${HADIR_TENANT_MODE:-single}
      HADIR_ENV: ${HADIR_ENV:-dev}
    volumes:
      - ./backend:/app
      # Encrypted employee photos (P6) and capture crops (P8) land under
      # /data/faces. Kept on a named volume so photos survive
      # `docker compose down` but reset on `down -v`.
      - faces_data:/data
      # InsightFace model cache (~250 MB buffalo_l). The library
      # downloads to $HOME/.insightface on first use; keeping it on a
      # named volume avoids re-downloading on every container restart.
      - insightface_models:/root/.insightface
      # P21: read-only mount of the frontend tree so the JSX i18n
      # lint test can scan ``frontend/src/**/*.tsx`` from the backend
      # pytest run. Defensive — the lint skips gracefully if the
      # mount is absent (e.g. a non-compose pytest invocation).
      - ./frontend:/frontend:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      # Inside the compose network the backend is reachable by service name.
      VITE_BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      # Named volume keeps the Linux-built node_modules separate from the
      # macOS-built one on the host bind mount.
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
  faces_data:
  insightface_models:
