# Maugood alertmanager config (v1.0 P26).
#
# Two delivery paths, both operator-configurable:
#
#   * webhook  — POSTs the JSON alert payload to a URL the
#                operator owns. Most teams wire this to Slack,
#                PagerDuty, or a tenant-specific incident bus.
#   * email    — falls back to the operator-configured Admin
#                inbox when no webhook is set.
#
# Both endpoints come from environment variables so the same
# YAML works across environments without templating:
#
#   MAUGOOD_ALERTMANAGER_WEBHOOK_URL   (e.g. https://hooks.slack.com/...)
#   MAUGOOD_ALERTMANAGER_SMTP_HOST     SMTP relay
#   MAUGOOD_ALERTMANAGER_SMTP_FROM     "Maugood Alerts <alerts@example.com>"
#   MAUGOOD_ALERTMANAGER_ADMIN_EMAIL   Admin inbox (comma-separated)
#
# Keep the routing tree shallow for the pilot: warnings + criticals
# all fan out the same way. Per-tenant fan-out via Alertmanager
# routes is M3 hardening territory once we know how Omran wants
# to slice incidents across tenants.

global:
  resolve_timeout: 5m
  smtp_smarthost: "${MAUGOOD_ALERTMANAGER_SMTP_HOST:-}"
  smtp_from: "${MAUGOOD_ALERTMANAGER_SMTP_FROM:-alerts@maugood.local}"
  smtp_require_tls: true

route:
  receiver: maugood-default
  group_by: ["alertname", "tenant"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = critical
      receiver: maugood-default
      group_wait: 0s
      repeat_interval: 1h

receivers:
  - name: maugood-default
    webhook_configs:
      - url: "${MAUGOOD_ALERTMANAGER_WEBHOOK_URL:-http://localhost:5001/_devnull}"
        send_resolved: true
    email_configs:
      - to: "${MAUGOOD_ALERTMANAGER_ADMIN_EMAIL:-}"
        send_resolved: true
        # Fall back to "skip" when no SMTP is configured —
        # Alertmanager refuses to send mail when smtp_smarthost
        # is empty, so the empty-string defaults above are safe.
