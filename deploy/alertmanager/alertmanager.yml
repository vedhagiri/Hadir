# Maugood alertmanager config (v1.0 P26).
#
# The pre-fix version of this file used ``${VAR:-default}`` shell-
# style placeholders for SMTP host / webhook URL / admin inbox.
# Alertmanager DOES NOT expand environment variables in its config —
# v0.27.0 has no expansion flag at all, and v0.28+ requires an
# explicit opt-in. Result: the binary tried to parse literal
# ``${...}`` strings as an email address, failed config validation,
# crashed, and Docker restarted it forever.
#
# This rewrite ships a clean static config that runs out of the box
# with no delivery configured. Alerts still group, dedup, and show
# up on the Alertmanager UI at localhost:9093 — they just don't fan
# out to email or Slack until an operator wires that up below.
#
# To turn on Slack / PagerDuty / etc.:
#   1. Replace the empty ``webhook_configs`` block under the
#      ``maugood-default`` receiver with the receiver block your
#      provider documents. Alertmanager docs:
#      https://prometheus.io/docs/alerting/latest/configuration/
#   2. ``docker compose -f docker-compose-https-local.yaml restart alertmanager``
#
# To turn on email:
#   1. Fill in ``global.smtp_smarthost``, ``global.smtp_from``, and
#      uncomment the ``email_configs`` block under
#      ``maugood-default``. Use a real SMTP relay address — the
#      service won't accept ``${...}`` placeholders here either.
#   2. Restart the alertmanager container.
#
# Keep the routing tree shallow for now: warnings + criticals fan
# out the same way. Per-tenant route splits are M3 hardening
# territory once we know how operators want to slice incidents.

global:
  resolve_timeout: 5m
  # smtp_smarthost / smtp_from intentionally absent — uncomment +
  # fill in to enable email delivery. Alertmanager raises a clear
  # error when an email_config refers to an empty smtp_smarthost,
  # which is what we want during config bring-up.

route:
  receiver: maugood-default
  group_by: ["alertname", "tenant"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = critical
      receiver: maugood-default
      group_wait: 0s
      repeat_interval: 1h

receivers:
  # Default receiver runs in "store-only" mode — alerts are grouped,
  # dedup'd, and visible on the Alertmanager UI but not pushed to
  # any external service. Add webhook_configs / email_configs blocks
  # here to enable delivery (see the comments at the top of the file
  # for the wire-up steps).
  - name: maugood-default
