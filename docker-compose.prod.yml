# Maugood production overlay (v1.0 P23).
#
# Layered on top of ``docker-compose.yml``:
#
#     docker compose \
#         -f docker-compose.yml \
#         -f docker-compose.prod.yml \
#         up -d
#
# Differences from dev:
#   * adds ``nginx`` fronting the backend on :443 (TLS) and :80
#     (HTTP -> HTTPS redirect, with a /.well-known/acme-challenge
#     carve-out for the optional Let's Encrypt overlay).
#   * the frontend service is *removed* — the frontend bundle is
#     built into the nginx image and served as static files.
#   * the backend port is no longer exposed on the host; only
#     nginx reaches it on the private ``maugood-internal`` network.
#   * production env vars (``MAUGOOD_ENV=production``,
#     ``MAUGOOD_BEHIND_PROXY=true``,
#     ``MAUGOOD_SESSION_COOKIE_SECURE=true``, etc.) are wired
#     through.
#
# See ``docs/deploy-production.md`` for the full runbook.

services:
  postgres:
    networks:
      - maugood-internal
    # Don't expose the DB port off-host in prod.
    ports: !reset []

  backend:
    environment:
      MAUGOOD_ENV: production
      MAUGOOD_BEHIND_PROXY: "true"
      MAUGOOD_FORWARDED_ALLOW_IPS: "*"
      MAUGOOD_SESSION_COOKIE_SECURE: "true"
      # Compose-level interpolation pulls these from the ``.env``
      # file you point ``docker compose --env-file`` at. The
      # ``:?`` syntax errors out at compose-up time if any are
      # missing — the production startup check would then catch
      # placeholders that survive, defence-in-depth.
      MAUGOOD_ALLOWED_ORIGINS: ${MAUGOOD_ALLOWED_ORIGINS:?must be set in production}
      MAUGOOD_OIDC_REDIRECT_BASE_URL: ${MAUGOOD_OIDC_REDIRECT_BASE_URL:?must be set in production}
      MAUGOOD_SESSION_SECRET: ${MAUGOOD_SESSION_SECRET:?rotate before production}
      MAUGOOD_FERNET_KEY: ${MAUGOOD_FERNET_KEY:?rotate before production}
      MAUGOOD_AUTH_FERNET_KEY: ${MAUGOOD_AUTH_FERNET_KEY:?rotate before production}
      MAUGOOD_REPORT_SIGNED_URL_SECRET: ${MAUGOOD_REPORT_SIGNED_URL_SECRET:?rotate before production}
    networks:
      - maugood-internal
    # Backend port is internal-only in production; nginx reaches
    # it on the private network.
    ports: !reset []

  # Remove the dev frontend container — nginx serves the static
  # bundle baked into its own image.
  frontend:
    profiles:
      - never

  # P24: nightly backup container. supercronic fires
  # ``backend/scripts/backup.sh`` at 02:00 Asia/Muscat by default
  # (override via ``TZ`` if you ever move tenants to another
  # region). The script writes to the ``backup_storage`` named
  # volume; an operator can also point ``MAUGOOD_BACKUP_S3_URI``
  # at an S3-compatible bucket for off-site copies. See
  # ``docs/disaster-recovery.md`` and ``docs/dr-rehearsal.md``.
  backup:
    build:
      context: .
      dockerfile: ops/backup/Dockerfile
    image: maugood-backup:latest
    environment:
      MAUGOOD_ADMIN_DATABASE_URL: ${MAUGOOD_ADMIN_DATABASE_URL:?must be set in production}
      MAUGOOD_BACKUP_ROOT: /backup
      MAUGOOD_DATA_ROOT: /data
      MAUGOOD_BACKUP_S3_URI: ${MAUGOOD_BACKUP_S3_URI:-}
      MAUGOOD_BACKUP_RETAIN_DAILY: ${MAUGOOD_BACKUP_RETAIN_DAILY:-30}
      MAUGOOD_BACKUP_RETAIN_WEEKLY: ${MAUGOOD_BACKUP_RETAIN_WEEKLY:-12}
      MAUGOOD_BACKUP_RETAIN_MONTHLY: ${MAUGOOD_BACKUP_RETAIN_MONTHLY:-12}
      TZ: ${MAUGOOD_BACKUP_TZ:-Asia/Muscat}
    volumes:
      # Backup output. ``backup_storage`` is a named volume so
      # the destination survives container rebuilds without
      # bind-mount path drift on the host. Operators who prefer
      # a host bind-mount can override via the env file.
      - ${MAUGOOD_BACKUP_DIR:-backup_storage}:/backup
      # Read-only mount of the data dirs so tar can snapshot
      # them. Read-only is the load-bearing red line —
      # supercronic should never mutate the source artifacts.
      - faces_data:/data:ro
      # Bind-mount the script directory so updates ship without
      # an image rebuild.
      - ./backend/scripts:/app/scripts:ro
    depends_on:
      - postgres
    networks:
      - maugood-internal
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: ops/nginx/Dockerfile
    image: maugood-nginx:latest
    environment:
      MAUGOOD_PUBLIC_HOSTNAME: ${MAUGOOD_PUBLIC_HOSTNAME:?must be set (e.g. maugood.example.com)}
      MAUGOOD_TLS_CERT: /etc/nginx/certs/fullchain.pem
      MAUGOOD_TLS_KEY: /etc/nginx/certs/privkey.pem
    volumes:
      # Operator-supplied certs. Default is the layout in
      # ops/certs/ — generate or copy ``fullchain.pem`` +
      # ``privkey.pem`` there before bringing the stack up.
      # Paths are configurable via the env file.
      - ${MAUGOOD_TLS_CERT_DIR:-./ops/certs}:/etc/nginx/certs:ro
      # ACME challenge directory — only consumed if you layer
      # docker-compose.le.yml on top.
      - certbot_webroot:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - maugood-internal
      - default

  # P26: Prometheus scrapes ``backend:8000/metrics`` over the
  # private docker network every 15s. Listens on :9090 only on
  # the internal network — Grafana proxies to it. We do NOT
  # expose :9090 on the host in production; an operator who
  # needs ad-hoc PromQL access tunnels in via ``docker compose
  # exec``. Same red line applies to Alertmanager (:9093).
  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    networks:
      - maugood-internal
    depends_on:
      - backend
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    environment:
      MAUGOOD_ALERTMANAGER_WEBHOOK_URL: ${MAUGOOD_ALERTMANAGER_WEBHOOK_URL:-}
      MAUGOOD_ALERTMANAGER_SMTP_HOST: ${MAUGOOD_ALERTMANAGER_SMTP_HOST:-}
      MAUGOOD_ALERTMANAGER_SMTP_FROM: ${MAUGOOD_ALERTMANAGER_SMTP_FROM:-}
      MAUGOOD_ALERTMANAGER_ADMIN_EMAIL: ${MAUGOOD_ALERTMANAGER_ADMIN_EMAIL:-}
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    networks:
      - maugood-internal
    restart: unless-stopped

  # Grafana on :3000 — exposed off-host so operators can hit
  # the dashboards directly. Authentication is the operator-set
  # ``MAUGOOD_GRAFANA_ADMIN_PASSWORD``; the default credential is
  # rotated on first boot. Anonymous access is OFF.
  grafana:
    image: grafana/grafana:11.2.2
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${MAUGOOD_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${MAUGOOD_GRAFANA_ADMIN_PASSWORD:?must be set in production}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${MAUGOOD_GRAFANA_ROOT_URL:-http://localhost:3000}
    ports:
      - "${MAUGOOD_GRAFANA_PORT:-3000}:3000"
    networks:
      - maugood-internal
      - default
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  certbot_webroot:
  backup_storage:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  maugood-internal:
    driver: bridge
    internal: false
