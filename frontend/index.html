<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maugood</title>

    <!--
      Curated fonts (v1.0 P4). Three families — Inter (default), Lato,
      Plus Jakarta Sans — preloaded so the BrandingProvider can swap
      ``body { font-family: ... }`` instantly when an Admin changes
      the tenant's font key. No runtime font upload (BRD red line).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lato:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Portal target for every drawer + modal. Sibling to #root so
         drawers escape any ancestor that creates a containing block
         (e.g. ``will-change: transform`` on the page-transition
         wrapper from P28.6 — that anchored ``position: fixed``
         descendants to the page wrapper instead of the viewport).
         Drawers render into this node via React Portal. -->
    <div id="drawer-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
